<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Savings Goals — FinAlly Student</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Lora:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/global.css" /><link rel="stylesheet" href="../css/pages.css" />
</head>
<body>
  
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <div class="page-header">
        <div><h1 class="page-title">Savings Goals</h1><p class="page-subtitle">Track your financial milestones.</p></div>
        <button class="btn btn-primary" id="newGoalBtn">➕ New Goal</button>
      </div>

      <!-- Yearly goal strip -->
      <div class="card" id="yearlyGoalCard" style="margin-bottom:24px;display:none;">
        <div class="section-header">
          <div>
            <div class="section-title">🗓️ Yearly Savings Goal</div>
            <div class="section-sub" id="yearlyGoalSub">Loading…</div>
          </div>
          <div style="text-align:right;">
            <div style="font-family:var(--font-display);font-size:1.4rem;font-weight:800;" id="yearlyGoalPct">0%</div>
            <div style="font-size:0.78rem;color:var(--clr-muted);">funded</div>
          </div>
        </div>
        <div class="progress-bar" style="margin-bottom:12px;height:10px;"><div class="progress-fill" id="yearlyGoalBar" style="width:0%;"></div></div>
        <div class="alert alert-info" id="yearlyRecoveryTip" style="display:none;font-size:0.85rem;"></div>
      </div>

      <div class="goals-grid" id="goalsGrid">
        <div class="flex-center" style="padding:60px;grid-column:1/-1;"><div class="spinner" style="width:36px;height:36px;border-width:4px;"></div></div>
      </div>
    </main>
  </div>

  <!-- New Goal Modal -->
  <div class="modal-overlay" id="newGoalModal">
    <div class="modal">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
        <h3>New Savings Goal</h3>
        <button class="btn btn-ghost btn-sm" id="closeGoalModal">✕</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:18px;">
        <div class="form-group">
          <label class="form-label" for="goalName">Goal Name</label>
          <input class="form-input" id="goalName" type="text" placeholder="e.g. Laptop, Trip to Goa, Emergency Fund" />
        </div>
        <div class="form-group">
          <label class="form-label" for="goalTarget">Target Amount (₹)</label>
          <input class="form-input" id="goalTarget" type="number" placeholder="e.g. 15000" />
        </div>
        <div class="form-group">
          <label class="form-label" for="goalDeadline">Deadline (optional)</label>
          <input class="form-input" id="goalDeadline" type="date" />
        </div>
        <div class="form-group">
          <label class="form-label" for="goalInitial">Initial Deposit (₹)</label>
          <input class="form-input" id="goalInitial" type="number" placeholder="0" />
        </div>
        <button class="btn btn-primary btn-lg" id="saveGoalBtn" style="width:100%;justify-content:center;">Save Goal</button>
        <div id="goalSaveError" class="alert alert-danger hidden"></div>
      </div>
    </div>
  </div>

  <!-- Deposit Modal -->
  <div class="modal-overlay" id="depositModal">
    <div class="modal" style="max-width:360px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
        <h3>Add to Goal</h3>
        <button class="btn btn-ghost btn-sm" id="closeDepositModal">✕</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:18px;">
        <div class="form-group">
          <label class="form-label" for="depositAmount">Amount (₹)</label>
          <input class="form-input" id="depositAmount" type="number" placeholder="e.g. 500" />
        </div>
        <button class="btn btn-accent btn-lg" id="saveDepositBtn" style="width:100%;justify-content:center;">💰 Deposit</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="../js/utils/api.js"></script><script src="../js/utils/toast.js"></script>
  <script src="../js/utils/storage.js"></script><script src="../js/utils/helpers.js"></script>
  <script src="../js/modules/sidebar.js"></script><script src="../js/modules/goals.js"></script>
  <script>SidebarModule.render('goals'); GoalsModule.init();</script>
</body>
</html>
