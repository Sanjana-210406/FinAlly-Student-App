<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insights — FinAlly Student</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Lora:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/global.css" /><link rel="stylesheet" href="../css/pages.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <div class="page-header">
        <div><h1 class="page-title">Behavioral Insights</h1><p class="page-subtitle">Understand your spending patterns.</p></div>
      </div>

      <!-- Bot message timeline -->
      <div class="card" style="margin-bottom:24px;">
        <div class="section-header"><h3 class="section-title">🤖 Bot Insights</h3></div>
        <div id="botTimeline" style="display:flex;flex-direction:column;gap:12px;">
          <div class="flex-center" style="padding:20px;"><div class="spinner"></div></div>
        </div>
      </div>

      <div class="insights-grid">
        <!-- Day-of-week heatmap -->
        <div class="pattern-card">
          <div class="pattern-header">
            <div class="pattern-icon-wrap">📅</div>
            <div>
              <div class="pattern-title">Day-of-Week Spending</div>
              <div style="font-size:0.75rem;color:var(--clr-muted);">Darker = more spend</div>
            </div>
          </div>
          <div style="display:flex;gap:6px;margin-bottom:8px;">
            <span style="font-size:0.7rem;color:var(--clr-muted);width:100%;text-align:center;" id="heatmapDays"></span>
          </div>
          <div class="heatmap-grid" id="heatmapGrid"></div>
        </div>

        <!-- Category trend chart -->
        <div class="pattern-card">
          <div class="pattern-header">
            <div class="pattern-icon-wrap">📈</div>
            <div><div class="pattern-title">Category Trend (3 months)</div></div>
          </div>
          <canvas id="trendChart" height="160"></canvas>
        </div>

        <!-- Behavioral patterns list -->
        <div class="pattern-card" style="grid-column:span 2;">
          <div class="pattern-header">
            <div class="pattern-icon-wrap">🧠</div>
            <div><div class="pattern-title">Detected Patterns</div></div>
          </div>
          <div id="patternsList" style="display:flex;flex-direction:column;gap:12px;margin-top:4px;">
            <div class="flex-center" style="padding:20px;"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- Emotional spend history -->
        <div class="pattern-card">
          <div class="pattern-header">
            <div class="pattern-icon-wrap">💭</div>
            <div><div class="pattern-title">Emotional Spend Log</div></div>
          </div>
          <div id="emotionalLog">
            <div class="flex-center" style="padding:20px;"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- Predictive forecast -->
        <div class="pattern-card">
          <div class="pattern-header">
            <div class="pattern-icon-wrap">🔮</div>
            <div><div class="pattern-title">Month-End Forecast</div></div>
          </div>
          <div id="forecastList">
            <div class="flex-center" style="padding:20px;"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <div class="toast-container" id="toastContainer"></div>
  <script src="../js/utils/api.js"></script><script src="../js/utils/toast.js"></script>
  <script src="../js/utils/storage.js"></script><script src="../js/utils/helpers.js"></script>
  <script src="../js/modules/sidebar.js"></script><script src="../js/modules/insights.js"></script>
  <script>SidebarModule.render('insights'); InsightsModule.init();</script>
</body>
</html>
