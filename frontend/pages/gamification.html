<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Achievements — FinAlly Student</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Lora:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/global.css" /><link rel="stylesheet" href="../css/pages.css" />
</head>
<body>
  
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <div class="page-header">
        <div><h1 class="page-title">Achievements 🏆</h1><p class="page-subtitle">Earn badges and maintain streaks with good habits.</p></div>
      </div>

      <!-- Streaks section -->
      <div class="card" style="margin-bottom:24px;">
        <div class="section-header"><h3 class="section-title">🔥 Active Streaks</h3></div>
        <div class="streak-row" id="allStreaks" style="flex-wrap:wrap;">
          <div class="flex-center" style="padding:24px;width:100%;"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Badges -->
      <div class="section-header" style="margin-bottom:16px;">
        <h3 class="section-title">Badges</h3>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-outline btn-sm badgeFilter active" data-filter="all">All</button>
          <button class="btn btn-outline btn-sm badgeFilter" data-filter="earned">Earned</button>
          <button class="btn btn-outline btn-sm badgeFilter" data-filter="locked">Locked</button>
        </div>
      </div>
      <div class="badges-grid" id="badgesGrid">
        <div class="flex-center" style="padding:60px;grid-column:1/-1;"><div class="spinner" style="width:36px;height:36px;border-width:4px;"></div></div>
      </div>
    </main>
  </div>
  <div class="toast-container" id="toastContainer"></div>
  <script src="../js/utils/api.js"></script><script src="../js/utils/toast.js"></script>
  <script src="../js/utils/storage.js"></script><script src="../js/utils/helpers.js"></script>
  <script src="../js/modules/sidebar.js"></script><script src="../js/modules/gamification.js"></script>
  <script>SidebarModule.render('gamification'); GamificationModule.init();</script>
</body>
</html>
