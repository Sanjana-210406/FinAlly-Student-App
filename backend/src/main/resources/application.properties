# ============================================================
# application.properties — FinAlly Student Finance App
# ============================================================

# ── Server ───────────────────────────────────────────────────
server.port=${PORT:8080}

# ── MySQL DataSource ──────────────────────────────────────────
# Provide MySQL connection URL via DB_URL env var
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/finally_student?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
# NOTE: Do NOT commit real passwords. Use DB_PASSWORD env var.
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Connection Pool (HikariCP) — keeps Aiven free tier alive ──
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────────
# IMPORTANT: Replace with a strong random 256-bit secret before deployment
app.jwt.secret=${JWT_SECRET:REPLACE_WITH_A_SECURE_256_BIT_SECRET_KEY}
app.jwt.expiration-ms=86400000

# ── CORS ───────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://127.0.0.1:5500}

# ── Logging ───────────────────────────────────────────────────
logging.level.com.studentfinance=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n
