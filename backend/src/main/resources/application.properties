# ============================================================
# application.properties — FinAlly Student Finance App
# ============================================================

# ── Server ───────────────────────────────────────────────────
server.port=8080

# ── MySQL DataSource ──────────────────────────────────────────
# Replace with your local database URL
spring.datasource.url=jdbc:mysql://localhost:3306/finally_student?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
# WARNING: Do NOT push real passwords to public repositories.
# Replace 'YOUR_PASSWORD' with your actual MySQL password locally.
spring.datasource.password=YOUR_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────────
# IMPORTANT: Replace with a strong random 256-bit secret before deployment
# Example: Use a UUID or a long random string.
app.jwt.secret=REPLACE_WITH_A_SECURE_256_BIT_SECRET_KEY
app.jwt.expiration-ms=86400000

# ── CORS (allow React frontend) ───────────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://127.0.0.1:5500,*

# ── Logging ───────────────────────────────────────────────────
logging.level.com.studentfinance=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n
