# ── Server ───────────────────────────────────────────────────
server.port=8080

# ── H2 DataSource ──────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:finally_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=MONTH,YEAR
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────────────
app.jwt.secret=test_super_secret_key_for_jwt_which_must_be_long_enough_to_be_secure
app.jwt.expiration-ms=86400000

# ── Init SQL ──────────────────────────────────────────────────
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-test.sql
spring.jpa.defer-datasource-initialization=true
